# =============================================================================
# enviroment リポジトリ用の非秘密設定
# =============================================================================
# このファイルには秘密を書かない。
# パスワード、API キー、アクセストークンなどの実値は
# `env/secret/credential.yaml` に置く。
#
# ここでは主に以下のような「共有してよい参照値」だけを管理する。
# - WSL / Ubuntu の基本設定
# - ローカル接続ポート
# - クラウド CLI の既定リージョン
# - Docker Database の非秘密パラメータ

# -----------------------------------------------------------------------------
# WSL / Ubuntu
# -----------------------------------------------------------------------------
workspace_root: /home/ubuntu/repos/private-kit/environment-kit
wsl_distribution: Ubuntu
timezone: Asia/Tokyo
locale: ja_JP.UTF-8
default_region: ap-northeast-1

# -----------------------------------------------------------------------------
# PostgreSQL ポート方針
# -----------------------------------------------------------------------------
# apt で入る PostgreSQL と Docker PostgreSQL はポートを分ける。
local_postgres_port: 5432
docker_postgres_dev_port: 5433
docker_postgres_test_port: 5434
docker_postgres_dwh_port: 5435

# -----------------------------------------------------------------------------
# Docker Database
# -----------------------------------------------------------------------------
docker_postgres_user: postgres
docker_postgres_dev_db: dev_local
docker_postgres_test_db: dev_test
docker_postgres_dwh_db: dev_dwh
pgadmin_port: 5050

# -----------------------------------------------------------------------------
# 開発ツール / クラウド CLI
# -----------------------------------------------------------------------------
gcloud_primary_region: ap-northeast-1
aws_primary_region: ap-northeast-1
github_default_branch: main

# -----------------------------------------------------------------------------
# 補足
# -----------------------------------------------------------------------------
# Java / Kotlin はオプションであり、初期インストール既定ではない。
# ML 系は Python、非 ML 系は Rust を主軸とする。
