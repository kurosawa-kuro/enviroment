---
- name: Run runtime command checks
  shell: "{{ item.cmd }}"
  args:
    executable: /bin/bash
  register: runtime_command_checks
  changed_when: false
  loop:
    - name: rustc
      cmd: "command -v rustc >/dev/null 2>&1 && rustc --version || /opt/rust/bin/rustc --version"
      pattern: "rustc"
    - name: node
      cmd: "node --version"
      pattern: "v"
    - name: go
      cmd: "go version"
      pattern: "go version"
  loop_control:
    label: "{{ item.name }}"
  when: profile_runtime_enabled | default(true)

- name: Assert runtime commands are available
  assert:
    that:
      - item.rc == 0
      - item.item.pattern | length == 0 or (item.item.pattern in item.stdout)
    fail_msg: "Runtime check failed for {{ item.item.name }}: {{ item.stdout | default(item.stderr, true) }}"
    success_msg: "Runtime check passed for {{ item.item.name }}"
  loop: "{{ runtime_command_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - profile_runtime_enabled | default(true)
    - item.skipped is not defined or not item.skipped
