---
- name: Verify runtime scenario
  hosts: all
  gather_facts: false
  tasks:
    - name: Check runtime commands
      command: "{{ item.cmd }}"
      changed_when: false
      environment:
        RUSTUP_HOME: /opt/rust
        CARGO_HOME: /opt/rust
        PATH: "/opt/rust/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      loop:
        - { cmd: "/opt/rust/bin/rustc --version" }
        - { cmd: "/opt/rust/bin/cargo --version" }
        - { cmd: "node --version" }
        - { cmd: "npm --version" }
        - { cmd: "/usr/local/go/bin/go version" }

    - name: Check runtime profile files
      stat:
        path: "{{ item }}"
      register: runtime_profiles
      loop:
        - /etc/profile.d/rust.sh
        - /etc/profile.d/go.sh

    - name: Assert runtime profile files exist
      assert:
        that:
          - (runtime_profiles.results | map(attribute='stat.exists') | list) | min
