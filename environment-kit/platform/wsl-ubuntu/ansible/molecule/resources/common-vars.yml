---
download_dir: /tmp/molecule-ansible
local_tmp: /tmp/molecule-ansible
remote_tmp: /tmp/molecule-ansible
log_path: /tmp/molecule-ansible/ansible.log
default_wsl_user: root
validate_installation: false
preload_cache: false
base_manage_timezone: false
base_manage_locale: false
docker_manage_service: false
postgresql_manage_service: false
env_setting_file: "{{ playbook_dir }}/../fixtures/setting.yml"
git_default_branch: "main"
git_pull_rebase: "false"
git_core_autocrlf: "input"
git_core_filemode: "false"
git_global_excludesfile: "~/.gitignore_global"
git_user_name: ""
git_user_email: ""
timezone: "Asia/Tokyo"
locale_lang: "ja_JP.UTF-8"
doppler_version: "3.70.0"
python_uv_enabled: true
rust_version: "stable"
nodejs_version: "22.11.0"
go_version: "1.25.0"
install_java_enabled: false
install_kotlin_enabled: false
