---
- name: Destroy Molecule containers
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    scenario_name: "{{ lookup('env', 'MOLECULE_SCENARIO_NAME') }}"
    scenario_file: >-
      {{
        lookup('env', 'MOLECULE_FILE')
        or (
          lookup('env', 'MOLECULE_PROJECT_DIRECTORY')
          ~ '/molecule/'
          ~ scenario_name
          ~ '/molecule.yml'
        )
      }}
    scenario_yml: "{{ lookup('file', scenario_file) | from_yaml }}"
  tasks:
    - name: Stop and remove scenario containers
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - "{{ item.name }}"
      register: destroy_result
      failed_when: destroy_result.rc not in [0, 1]
      changed_when: destroy_result.rc == 0
      loop: "{{ scenario_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Remove dynamic inventory
      file:
        path: "{{ molecule_ephemeral_directory }}/inventory/molecule_inventory.yml"
        state: absent
