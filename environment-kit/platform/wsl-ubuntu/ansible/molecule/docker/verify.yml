---
- name: Verify docker scenario
  hosts: all
  gather_facts: false
  tasks:
    - name: Check docker package commands
      command: "{{ item }}"
      changed_when: false
      loop:
        - docker --version
        - docker compose version

    - name: Check docker repository configuration
      shell: |
        grep -R "download.docker.com/linux/ubuntu" /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null
      changed_when: false
      register: docker_repo

    - name: Assert docker repository is configured
      assert:
        that:
          - docker_repo.rc == 0
