---
- name: Verify docker scenario
  hosts: all
  gather_facts: false
  tasks:
    - name: Check docker package commands
      command: "{{ item }}"
      changed_when: false
      loop:
        - docker --version
        - docker compose version

    - name: Check docker repository file
      stat:
        path: /etc/apt/sources.list.d/docker.list
      register: docker_repo

    - name: Assert docker repository exists
      assert:
        that:
          - docker_repo.stat.exists
