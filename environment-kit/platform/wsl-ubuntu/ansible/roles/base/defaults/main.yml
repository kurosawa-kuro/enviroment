---
base_system_packages:
  - language-pack-ja
  - python3
  - python3-pip
  - git
  - curl
  - wget
  - tree
  - jq
  - htop
  - lsof
  - make
  - unzip
  - zip
  - net-tools
  - dnsutils
  - iproute2
  - pkg-config
  - openssh-server
  - build-essential
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
base_install_pipx: true
python_uv_enabled: true
base_install_doppler: true
doppler_version: "3.70.0"
timezone: "Asia/Tokyo"
locale_lang: "ja_JP.UTF-8"
default_wsl_user: "ubuntu"
base_manage_timezone: true
base_manage_locale: true
validate_installation: true
