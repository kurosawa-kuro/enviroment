---
# Update package cache
- name: Update apt cache
  apt:
    update_cache: yes

# Install WSL base system packages
- name: Install WSL base system packages
  apt:
    name:
      - language-pack-ja
      - python3
      - python3-pip
      - git
      - curl
      - wget
      - tree
      - jq
      - htop
      - lsof
      - make
      - unzip
      - zip
      - net-tools
      - dnsutils
      - iproute2
      - pkg-config
      - openssh-server
      - build-essential
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

# Install Python pipx via system package manager
- name: Install pipx
  apt:
    name: pipx
    state: present

- name: Install uv
  shell: |
    curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
  args:
    creates: /usr/local/bin/uv
    executable: /bin/bash
  when: python_uv_enabled | default(true)

- name: Check current timezone
  command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false
  when: base_manage_timezone | default(true)

- name: Set system timezone
  command: timedatectl set-timezone {{ timezone }}
  when:
    - base_manage_timezone | default(true)
    - current_timezone.stdout != timezone

- name: Check current locale
  command: locale
  register: current_locale
  changed_when: false
  when: base_manage_locale | default(true)

- name: Set default locale
  command: update-locale LANG={{ locale_lang }}
  when:
    - base_manage_locale | default(true)
    - ("LANG=" + locale_lang) not in current_locale.stdout

- name: Configure /etc/wsl.conf
  template:
    src: wsl.conf.j2
    dest: /etc/wsl.conf
    mode: '0644'

# Install Doppler CLI
- name: Download Doppler CLI {{ doppler_version }}
  get_url:
    url: "https://github.com/DopplerHQ/cli/releases/download/{{ doppler_version }}/doppler_{{ doppler_version }}_linux_amd64.tar.gz"
    dest: "{{ download_dir }}/doppler.tar.gz"

- name: Extract and install Doppler CLI
  unarchive:
    src: "{{ download_dir }}/doppler.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/doppler

# Validate base role installation
- name: Validate base role installation
  include_tasks: validate.yml
  when: validate_installation | default(true)
