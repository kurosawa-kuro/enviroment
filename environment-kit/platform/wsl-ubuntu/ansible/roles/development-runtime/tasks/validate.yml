---
# Development runtime validation
- name: "Validate development-runtime role installation"
  block:
    - name: "Check development runtime versions"
      command: "{{ item.cmd }}"
      register: version_check
      failed_when: version_check.rc != 0
      environment:
        RUSTUP_HOME: /opt/rust
        CARGO_HOME: /opt/rust
        PATH: "/opt/rust/bin:/usr/local/go/bin:{{ ansible_env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
      when: item.enabled | bool
      loop_control:
        label: "{{ item.name }}"
      vars:
        runtime_validation_targets:
          - { name: "rustc", cmd: "/opt/rust/bin/rustc --version", enabled: "{{ install_rust_enabled | default(true) | bool }}" }
          - { name: "cargo", cmd: "/opt/rust/bin/cargo --version", enabled: "{{ install_rust_enabled | default(true) | bool }}" }
          - { name: "node", cmd: "node --version", enabled: "{{ install_nodejs_enabled | default(true) | bool }}" }
          - { name: "npm", cmd: "npm --version", enabled: "{{ install_nodejs_enabled | default(true) | bool }}" }
          - { name: "go", cmd: "go version", enabled: "{{ install_go_enabled | default(true) | bool }}" }
      loop: "{{ runtime_validation_targets }}"

    - name: "Test Node.js functionality"
      shell: |
        node -e "console.log('Node.js test passed')"
      register: node_test
      failed_when: node_test.rc != 0
      environment:
        PATH: "/opt/rust/bin:/usr/local/go/bin:{{ ansible_env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
      when: install_nodejs_enabled | default(true)

    - name: "Test Go functionality"
      shell: |
        echo 'package main; import "fmt"; func main() { fmt.Println("Go test passed") }' > /tmp/test.go
        go run /tmp/test.go
        rm -f /tmp/test.go
      register: go_test
      failed_when: go_test.rc != 0
      environment:
        PATH: "/opt/rust/bin:/usr/local/go/bin:{{ ansible_env.PATH | default('/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin') }}"
      when: install_go_enabled | default(true)

    - name: "Check Java toolchain versions"
      command: "{{ item.cmd }}"
      register: java_version_check
      failed_when: java_version_check.rc != 0
      loop:
        - { name: "java", cmd: "java --version" }
        - { name: "javac", cmd: "javac --version" }
        - { name: "maven", cmd: "mvn --version" }
        - { name: "gradle", cmd: "gradle --version" }
      when: install_java_enabled | default(false)

    - name: "Test Java functionality"
      shell: |
        echo 'public class Test { public static void main(String[] args) { System.out.println("Java test passed"); } }' > /tmp/Test.java
        javac /tmp/Test.java
        java -cp /tmp Test
        rm -f /tmp/Test.java /tmp/Test.class
      register: java_test
      failed_when: java_test.rc != 0
      when: install_java_enabled | default(false)

    - name: "Check Kotlin toolchain versions"
      command: "{{ item.cmd }}"
      register: kotlin_version_check
      failed_when: kotlin_version_check.rc != 0
      loop:
        - { name: "kotlin", cmd: "kotlin -version" }
        - { name: "kotlinc", cmd: "kotlinc -version" }
      when: install_kotlin_enabled | default(false)

  rescue:
    - name: "Log validation failure"
      debug:
        msg: "Validation failed for development-runtime role: {{ ansible_failed_result.msg | default('Unknown error') }}"
    
    - name: "Record failed role"
      set_fact:
        failed_roles: "{{ failed_roles | default([]) + ['development-runtime'] }}"

- name: "Development runtime validation completed successfully"
  debug:
    msg: "All development runtime components validated successfully"
