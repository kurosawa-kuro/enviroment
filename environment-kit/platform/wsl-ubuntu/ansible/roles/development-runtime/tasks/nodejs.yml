- name: Download NodeSource signing key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource-repo.gpg.key
    mode: "0644"

- name: Install NodeSource signing key
  shell: |
    gpg --dearmor --yes --output /usr/share/keyrings/nodesource.gpg /tmp/nodesource-repo.gpg.key
  args:
    creates: /usr/share/keyrings/nodesource.gpg
    executable: /bin/bash

- name: Install NodeSource repository for Node.js {{ nodejs_version }}
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ nodejs_version.split('.')[0] }}.x nodistro main"
    filename: nodesource
    state: present
    update_cache: yes

- name: Install Node.js from NodeSource
  block:
    - name: Install Node.js {{ nodejs_version }}
      apt:
        name: "nodejs={{ nodejs_version }}*"
        state: present
        update_cache: yes
  rescue:
    - name: Install Node.js {{ nodejs_version.split('.')[0] }}.x fallback
      apt:
        name: nodejs
        state: present
        update_cache: yes
