---
- name: "Validate kubernetes role installation"
  block:
    - name: "Check kubectl"
      command: kubectl version --client
      register: kubectl_check
      failed_when: kubectl_check.rc != 0

    - name: "Check Kubernetes node tools"
      command: "{{ item.cmd }}"
      register: node_tool_check
      failed_when: node_tool_check.rc != 0
      loop:
        - { name: "kubeadm", cmd: "kubeadm version" }
        - { name: "kubelet", cmd: "kubelet --version" }
      when: kubernetes_install_kube_node_tools | default(false)

    - name: "Check optional cluster tools"
      command: "{{ item.cmd }}"
      register: cluster_tool_check
      failed_when: cluster_tool_check.rc != 0
      loop:
        - { name: "kind", cmd: "kind version", enabled: "{{ kubernetes_install_kind | default(true) }}" }
        - { name: "minikube", cmd: "minikube version", enabled: "{{ kubernetes_install_minikube | default(false) }}" }
        - { name: "helm", cmd: "helm version", enabled: "{{ kubernetes_install_helm | default(true) }}" }
        - { name: "kustomize", cmd: "kustomize version", enabled: "{{ kubernetes_install_kustomize | default(true) }}" }
      when: item.enabled | bool
      loop_control:
        label: "{{ item.name }}"

    - name: "Check kubectl plugins"
      command: "{{ item.cmd }}"
      register: plugin_check
      failed_when: plugin_check.rc != 0
      loop:
        - { name: "kubectx", cmd: "kubectx --help" }
        - { name: "kubens", cmd: "kubens --help" }
        - { name: "k9s", cmd: "k9s version" }
        - { name: "stern", cmd: "stern --version" }
      when: kubernetes_install_kubectl_plugins | default(false)

    - name: "Check CLI utilities"
      command: "{{ item.cmd }}"
      register: cli_check
      failed_when: cli_check.rc != 0
      loop:
        - { name: "jq", cmd: "jq --version" }
        - { name: "yq", cmd: "yq --version" }

    - name: "Test Kind functionality"
      shell: |
        kind create cluster --name test-validation --wait 30s
        kubectl cluster-info --context kind-test-validation
        kind delete cluster --name test-validation
      register: kind_test
      failed_when: kind_test.rc != 0
      ignore_errors: yes
      when: kubernetes_install_kind | default(true)

    - name: "Test Helm functionality"
      shell: |
        helm repo add stable https://charts.helm.sh/stable
        helm repo update
        helm search repo stable/nginx
      register: helm_test
      failed_when: helm_test.rc != 0
      when: kubernetes_install_helm | default(true)

  rescue:
    - name: "Log validation failure"
      debug:
        msg: "Validation failed for kubernetes role: {{ ansible_failed_result.msg | default('Unknown error') }}"

    - name: "Record failed role"
      set_fact:
        failed_roles: "{{ failed_roles | default([]) + ['kubernetes'] }}"

- name: "Kubernetes validation completed successfully"
  debug:
    msg: "All Kubernetes components validated successfully"
