# Install CLI utilities
# Install jq
- name: Download jq {{ jq_version }}
  get_url:
    url: "https://github.com/jqlang/jq/releases/download/jq-{{ jq_version }}/jq-linux64"
    dest: /usr/local/bin/jq
    mode: '0755'

# Install yq
- name: Download yq {{ yq_version }}
  get_url:
    url: "https://github.com/mikefarah/yq/releases/download/v{{ yq_version }}/yq_linux_amd64"
    dest: /usr/local/bin/yq
    mode: '0755'

# Install bash completion
- name: Install bash-completion package
  apt:
    name: bash-completion
    state: present
  when: bash_completion | default(false)

# Install auditd if specified
- name: Install auditd package
  apt:
    name: auditd
    state: present
  when: auditd | default(false)

# Install apparmor-utils if specified
- name: Install apparmor-utils package
  apt:
    name: apparmor-utils
    state: present
  when: apparmor_utils | default(false)

# Validate kubernetes role installation
- name: Validate kubernetes role installation
  include_tasks: validate.yml
  when: validate_installation | default(true)