---
- name: Install Kubernetes apt repository prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
  when: kubernetes_install_kube_node_tools | default(false)

- name: Ensure Kubernetes apt keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: kubernetes_install_kube_node_tools | default(false)

- name: Download Kubernetes apt repository key
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version.split('.')[0] }}.{{ kubernetes_version.split('.')[1] }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
  when: kubernetes_install_kube_node_tools | default(false)

- name: Configure Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version.split('.')[0] }}.{{ kubernetes_version.split('.')[1] }}/deb/ /"
    filename: kubernetes
    state: present
  when: kubernetes_install_kube_node_tools | default(false)

- name: Install kubeadm and kubelet
  apt:
    name:
      - "kubeadm={{ kubeadm_version }}-*"
      - "kubelet={{ kubelet_version }}-*"
    state: present
    update_cache: yes
  when: kubernetes_install_kube_node_tools | default(false)

- name: Hold kubeadm and kubelet packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
  when: kubernetes_install_kube_node_tools | default(false)

- name: Download kubectl {{ kubectl_version }}
  get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Download kind {{ kind_version }}
  get_url:
    url: "https://kind.sigs.k8s.io/dl/v{{ kind_version }}/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: '0755'
  when: kubernetes_install_kind | default(true)

- name: Download kustomize {{ kustomize_version }}
  get_url:
    url: "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv{{ kustomize_version }}/kustomize_v{{ kustomize_version }}_linux_amd64.tar.gz"
    dest: "{{ download_dir }}/kustomize.tar.gz"
  when: kubernetes_install_kustomize | default(true)

- name: Extract kustomize
  unarchive:
    src: "{{ download_dir }}/kustomize.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/kustomize
  when:
    - kubernetes_install_kustomize | default(true)
    - not ansible_check_mode

- name: Download helm {{ helm_version }}
  get_url:
    url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
    dest: "{{ download_dir }}/helm.tar.gz"
  when: kubernetes_install_helm | default(true)

- name: Extract helm
  unarchive:
    src: "{{ download_dir }}/helm.tar.gz"
    dest: "{{ download_dir }}"
    remote_src: yes
    creates: "{{ download_dir }}/linux-amd64/helm"
  when:
    - kubernetes_install_helm | default(true)
    - not ansible_check_mode

- name: Check if helm is already installed
  stat:
    path: /usr/local/bin/helm
  register: helm_installed
  when: kubernetes_install_helm | default(true)

- name: Install helm binary
  copy:
    src: "{{ download_dir }}/linux-amd64/helm"
    dest: /usr/local/bin/helm
    mode: '0755'
    remote_src: yes
  when:
    - kubernetes_install_helm | default(true)
    - not helm_installed.stat.exists

- name: Download minikube {{ minikube_version }}
  get_url:
    url: "https://storage.googleapis.com/minikube/releases/v{{ minikube_version }}/minikube-linux-amd64"
    dest: /usr/local/bin/minikube
    mode: '0755'
  when: kubernetes_install_minikube | default(false)

- name: Download containerd {{ containerd_version }}
  get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    dest: "{{ download_dir }}/containerd.tar.gz"
  when: kubernetes_install_container_runtime_tools | default(false)

- name: Extract containerd
  unarchive:
    src: "{{ download_dir }}/containerd.tar.gz"
    dest: /usr/local
    remote_src: yes
    creates: /usr/local/bin/containerd
  when:
    - kubernetes_install_container_runtime_tools | default(false)
    - not ansible_check_mode

- name: Download crictl {{ crictl_version }}
  get_url:
