---
# WSL Ubuntu Environment Configuration (Single Source of Truth)
# このファイルはすべてのバージョン情報の一元管理を行う
# requirements.yml は make generate-requirements で自動生成される

ansible_become_password: wsl
ansible_become_pass: "{{ ansible_become_password }}"
wsl_profile: "full"
execution_platform: "wsl"

env_setting_file: "{{ playbook_dir }}/../../../env/config/setting.yaml"
profile_base_enabled: true
profile_runtime_enabled: true
profile_container_enabled: true
profile_security_enabled: true
profile_cloud_enabled: true
profile_data_enabled: true
profile_user_enabled: true
