---
execution_platform: wsl
env_secret_file: "{{ playbook_dir }}/../../../env/secret/credential.yaml"
env_setting_file: "{{ playbook_dir }}/../../../env/config/setting.yaml"
download_dir: "/home/ubuntu/.tmp-ansible"
local_tmp: "/home/ubuntu/.tmp-ansible"
remote_tmp: "/home/ubuntu/.tmp-ansible"
log_path: /home/ubuntu/.ansible/ansible.log
default_wsl_user: "ubuntu"
locale_lang: "ja_JP.UTF-8"
timezone: "Asia/Tokyo"
wsl_interop_enabled: true
wsl_append_windows_path: false
wsl_automount_root: "/mnt/"
wsl_automount_options: "metadata,umask=22,fmask=11"
