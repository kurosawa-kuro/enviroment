---
- hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../group_vars/all.yml
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - name: Prepare Ansible working directories
      include_tasks: ../tasks/setup_download_dirs.yml

  tasks:
    - name: Apply opt-in user bootstrap
      import_role:
        name: user-bootstrap
