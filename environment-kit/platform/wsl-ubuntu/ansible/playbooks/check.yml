---
- name: Check WSL development environment
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - "../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - ../group_vars/domains/core.yml
    - ../group_vars/domains/runtime.yml
    - ../group_vars/domains/container.yml
    - ../group_vars/domains/security.yml
    - ../group_vars/domains/cloud.yml
    - ../group_vars/domains/data.yml
    - ../group_vars/domains/user.yml
    - "{{ playbook_dir }}/../../../env/config/setting.yaml"
    - "{{ playbook_dir }}/../../../env/secret/credential.yaml"

  tasks:
    - name: Verify core domain
      import_tasks: ../taskfiles/verify/core.yml

    - name: Verify runtime domain
      import_tasks: ../taskfiles/verify/runtime.yml

    - name: Verify container domain
      import_tasks: ../taskfiles/verify/container.yml

    - name: Verify security domain
      import_tasks: ../taskfiles/verify/security.yml

    - name: Verify cloud domain
      import_tasks: ../taskfiles/verify/cloud.yml

    - name: Verify data domain
      import_tasks: ../taskfiles/verify/data.yml
