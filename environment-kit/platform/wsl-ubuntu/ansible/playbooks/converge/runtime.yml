---
- name: Converge development runtimes
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - ../../group_vars/domains/runtime.yml
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - import_tasks: ../../taskfiles/prepare.yml

  tasks:
    - name: Install development runtimes
      import_role:
        name: development-runtime
      when: profile_runtime_enabled | default(true)
