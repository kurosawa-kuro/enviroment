---
- name: Converge cloud tooling
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - import_tasks: ../../taskfiles/prepare.yml

  tasks:
    - name: Install AWS and cloud tools
      import_role:
        name: aws
      when: profile_cloud_enabled | default(true)

    - name: Install Google Cloud CLI
      import_role:
        name: gcp
      when: profile_cloud_enabled | default(true)
