---
- name: Converge Rust runtime only
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - ../../group_vars/domains/core.yml
    - ../../group_vars/domains/runtime.yml
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - import_tasks: ../../taskfiles/prepare.yml

  tasks:
    - name: Setup local cache system
      import_role:
        name: cache
      when:
        - profile_runtime_enabled | default(true)
        - cache_enabled | default(true)

    - name: Install base system tools for Rust setup
      import_role:
        name: base
      when: profile_base_enabled | default(true)

    - name: Install Rust only
      import_role:
        name: development-runtime
      vars:
        install_rust_enabled: true
        install_nodejs_enabled: false
        install_go_enabled: false
        install_java_enabled: false
        install_kotlin_enabled: false
      when: profile_runtime_enabled | default(true)
