---
- name: Converge base foundation
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - import_tasks: ../../taskfiles/prepare.yml

  tasks:
    - name: Setup local cache system
      import_role:
        name: cache
      when:
        - profile_base_enabled | default(true)
        - cache_enabled | default(true)

    - name: Apply base WSL Ubuntu setup
      import_role:
        name: base
      when: profile_base_enabled | default(true)
