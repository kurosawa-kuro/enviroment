---
- name: Converge security tooling
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - "{{ playbook_dir }}/../../../../env/secret/credential.yaml"
  pre_tasks:
    - import_tasks: ../../taskfiles/prepare.yml

  tasks:
    - name: Install security tools
      import_role:
        name: security
      when:
        - profile_security_enabled | default(true)
        - security_enabled | default(true)
