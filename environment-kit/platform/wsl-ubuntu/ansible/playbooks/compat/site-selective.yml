---
- hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - ../../group_vars/all.yml
    - "../../group_vars/platform/{{ execution_platform | default('wsl') }}.yml"
    - "../../group_vars/profiles/{{ wsl_profile | default('full') }}.yml"
    - ../../group_vars/domains/core.yml
    - ../../group_vars/domains/runtime.yml
    - ../../group_vars/domains/container.yml
    - ../../group_vars/domains/security.yml
    - ../../group_vars/domains/cloud.yml
    - ../../group_vars/domains/data.yml
    - ../../group_vars/domains/user.yml
    - ../../config.yml
    - "{{ playbook_dir }}/../../../../../env/secret/credential.yaml"
  pre_tasks:
    - name: Prepare Ansible working directories
      include_tasks: ../../tasks/setup_download_dirs.yml
  
  tasks:
    - name: Load configuration
      debug:
        msg: "設定ファイルを読み込みました"

    - name: Setup local cache system
      import_role:
        name: cache
      when: components.cache.enabled | default(true)
    
    - name: Install base system tools
      import_role:
        name: base
      when: components.base.enabled | default(true)

    - name: Apply user bootstrap
      import_role:
        name: user-bootstrap
      when: components.user_bootstrap.enabled | default(false)

    - name: Install selected development runtimes
      import_role:
        name: development-runtime
      vars:
        install_rust_enabled: "{{ components.rust.enabled | default(false) }}"
        install_nodejs_enabled: "{{ components.nodejs.enabled | default(false) }}"
        install_go_enabled: "{{ components.go.enabled | default(false) }}"
        install_java_enabled: "{{ components.java.enabled | default(false) }}"
        install_kotlin_enabled: "{{ components.kotlin.enabled | default(false) }}"
      when:
        - components.rust.enabled | default(false)
          or components.nodejs.enabled | default(false)
          or components.go.enabled | default(false)
          or components.java.enabled | default(false)
          or components.kotlin.enabled | default(false)

    - name: Install Docker
      import_role:
        name: docker
      when: components.docker.enabled | default(false)

    - name: Install Kubernetes tools
      import_role:
        name: kubernetes
      when: components.kubernetes.enabled | default(false)

    - name: Install security tools
      import_role:
        name: security
      when: components.security.enabled | default(false)

    - name: Install AWS and cloud tools
      import_role:
        name: aws
      when: components.aws.enabled | default(false)

    - name: Install Google Cloud CLI
      import_role:
        name: gcp
      when: components.gcp.enabled | default(false)

    - name: Setup PostgreSQL database
      import_role:
        name: postgresql
      when: components.postgresql.enabled | default(false)
