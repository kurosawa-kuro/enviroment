---
- hosts: localhost
  connection: local
  gather_facts: yes
  pre_tasks:
    - name: Prepare Ansible working directories
      include_tasks: tasks/setup_download_dirs.yml

  tasks:
    - name: Setup local cache system
      import_role:
        name: cache
      when: cache_enabled | default(true)

    - name: Install base system tools for Rust setup
      import_role:
        name: base

    - name: Install Rust only
      import_role:
        name: development-runtime
        tasks_from: rust
