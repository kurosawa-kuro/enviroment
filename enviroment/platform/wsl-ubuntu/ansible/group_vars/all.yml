---
# WSL Ubuntu Environment Configuration (Single Source of Truth)
# このファイルはすべてのバージョン情報の一元管理を行う
# requirements.yml は make generate-requirements で自動生成される

ansible_become_password: wsl

# Working directories
download_dir: "/home/wsl/.tmp-ansible"

# ライブラリ・ツール バージョン統一
python_version: "3.12.6"       # Python latest stable
python_pipx_version: "1.8.0"   # pipx latest
python_uv_enabled: true        # uv をシステムワイドに導入
doppler_version: "3.70.0"      # Doppler CLI latest
git_version: "system"
curl_version: "system"
wget_version: "system"
tree_version: "system"
openssh_version: "system"
locale_lang: "ja_JP.UTF-8"
timezone: "Asia/Tokyo"
wsl_interop_enabled: true
wsl_append_windows_path: false
wsl_automount_root: "/mnt/"
wsl_automount_options: "metadata,umask=22,fmask=11"
default_wsl_user: ""

# 開発ランタイム
rust_version: "stable"     # Rust (rustup 経由) / 非MLのメイン言語
nodejs_version: "22.11.0"  # Node.js LTS 2025
go_version: "1.25.0"       # Go latest stable 2025
java_version: "21"
kotlin_version: "2.2.10" 
maven_version: "3.9.9"
gradle_version: "8.12"
install_java_enabled: false
install_kotlin_enabled: false

# コンテナ・オーケストレーション（安定板・用途別に整理）

# 1) コンテナエンジン／ランタイム
docker_version: "system"
containerd_version: "1.7.20"
crictl_version: "1.33.0"
nerdctl_version: "1.7.6"

# 2) Kubernetes コア（同一 Minor で固定）
kubernetes_version: "1.33.4"
kubeadm_version: "1.33.4"
kubelet_version: "1.33.4"
kubectl_version: "1.33.4"

# 3) ローカルK8s（学習用クラスター）
kind_version: "0.24.0"
minikube_version: "1.35.0"

# 4) マニフェスト/パッケージ
kustomize_version: "5.7.0"
helm_version: "3.18.4"

# 5) セキュリティ／ポリシー（KSCA/CKS対策）
trivy_version: "0.54.0"
kube_bench_version: "0.8.0"
kube_hunter_version: "0.6.8"
kubescape_version: "3.0.0"
gatekeeper_version: "3.16.0" # OPA Gatekeeper
kyverno_version: "1.12.0"
auditd: true
apparmor_utils: true

# 6) kubectl プラグイン基盤＆操作補助
krew_version: "0.4.4"
kubectx_version: "0.9.5"
kubens_version: "0.9.5"
k9s_version: "0.32.5"
stern_version: "1.30.0"

# 7) CLI ユーティリティ
jq_version: "1.6"
yq_version: "4.44.3"
bash_completion: true


# クラウド・インフラ
gcloud_version: "latest"       # Google Cloud CLI (rapid channel / メインクラウド)。latest = 無版URLを使用
awscli_version: "2.28.10"      # AWS CLI latest stable 2025
terraform_version: "1.12.2"    # Terraform latest stable 2025
ghcli_version: "2.56.0"

# データベース
postgres_version: "15"
neonctl_version: "latest"      # Neon CLI (npm global)。サーバーレス PostgreSQL
postgres_port: 5432
postgres_user: "postgres"
postgres_password: "postgres"
postgres_db_local: "local_dev"
postgres_db_test: "local_test"
postgres_db_encoding: "UTF8"
postgres_extensions: "postgis,pgcrypto,uuid-ossp"
docker_postgres_dev_port: 5433
docker_postgres_test_port: 5434
docker_postgres_dwh_port: 5435

# Ansible Galaxy コレクション（実際に使用しているもののみ）
community_postgresql_version: ">=3.0.0"

# ローカル作業用パス
local_tmp: "/home/wsl/.tmp-ansible"
remote_tmp: "/home/wsl/.tmp-ansible"

log_path: /home/wsl/.ansible/ansible.log

# ユーザー初期化（opt-in）
user_bootstrap_enabled: false
git_default_branch: "main"
git_pull_rebase: "false"
git_core_autocrlf: "input"
git_core_filemode: "false"
git_global_excludesfile: "~/.gitignore_global"
git_user_name: ""
git_user_email: ""
