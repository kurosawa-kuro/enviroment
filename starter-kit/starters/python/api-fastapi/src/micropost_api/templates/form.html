{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<form action="{{ action }}" method="post">
    <label for="title">
        Title
        <input type="text" id="title" name="title" required maxlength="120"
               value="{{ post.title if post else '' }}">
    </label>
    <label for="content">
        Content
        <textarea id="content" name="content" rows="6" required>{{ post.content if post else '' }}</textarea>
    </label>
    <button type="submit">Save</button>
    <a href="{{ '/microposts/' ~ post.id if post else '/' }}" role="button" class="secondary">Cancel</a>
</form>
{% endblock %}
