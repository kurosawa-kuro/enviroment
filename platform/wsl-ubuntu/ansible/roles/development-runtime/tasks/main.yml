---
- name: Install Rust
  import_tasks: rust.yml

- name: Install Node.js
  import_tasks: nodejs.yml

- name: Install Go
  import_tasks: golang.yml

- name: Install Java toolchain
  import_tasks: java.yml
  when: install_java_enabled | default(false)

- name: Install Kotlin toolchain
  import_tasks: kotlin.yml
  when: install_kotlin_enabled | default(false)

- name: Validate development-runtime role installation
  include_tasks: validate.yml
  when: validate_installation | default(true)
