AWSTemplateFormatVersion: '2010-09-09'
Description: 'Network Infrastructure for EKS Cluster - VPC, Subnets, and Security Groups'

# =============================================================================
# Template Metadata
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Stack Dependencies"
        Parameters:
          - PrerequisitesStackName
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCidrBlock
          - PublicSubnet1Cidr
          - PublicSubnet2Cidr
          - PrivateSubnet1Cidr
          - PrivateSubnet2Cidr
          - EnableNatGateway
      - Label:
          default: "Resource Tagging"
        Parameters:
          - Environment
          - Version
          - Project
          - Owner

# =============================================================================
# Input Parameters
# =============================================================================
Parameters:
  # Stack Dependencies
  PrerequisitesStackName:
    Type: String
    Default: eks-prerequisites
    Description: Name of the prerequisites stack (01-prerequisites)
    MinLength: 1
    MaxLength: 128

  # Network Configuration
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))$

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 1 (AZ-1)
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))$

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2 (AZ-2)
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))$

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.10.0/24
    Description: CIDR block for private subnet 1 (AZ-1)
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))$

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.11.0/24
    Description: CIDR block for private subnet 2 (AZ-2)
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))$

  EnableNatGateway:
    Type: String
    Default: 'true'
    Description: Enable NAT Gateway for private subnets (required for private subnet internet access)
    AllowedValues: ['true', 'false']

  # Resource Tagging
  Environment:
    Type: String
    Default: learning
    Description: Environment name
    AllowedValues: [development, staging, production, learning]

  # Version Parameter
  Version:
    Type: String
    Default: v2
    Description: Version suffix for resource names

  Project:
    Type: String
    Default: eks-platform
    Description: Project name

  Owner:
    Type: String
    Default: admin
    Description: Owner of the resources

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  CreateNatGateway: !Equals [!Ref EnableNatGateway, 'true']

# =============================================================================
# Resources
# =============================================================================
Resources:
  # ============================================
  # VPC
  # ============================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${Project}-vpc'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Owner
          Value: !Ref Owner
        - Key: !Sub 'kubernetes.io/cluster/${Project}'
          Value: shared

  # ============================================
  # Internet Gateway
  # ============================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${Project}-igw'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ============================================
  # Public Subnets
  # ============================================
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${Project}-public-subnet-1'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Type
          Value: Public
        - Key: !Sub 'kubernetes.io/cluster/${Project}'
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: '1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${Project}-public-subnet-2'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Type
          Value: Public
        - Key: !Sub 'kubernetes.io/cluster/${Project}'
          Value: shared
        - Key: kubernetes.io/role/elb
          Value: '1'

  # ============================================
  # Private Subnets
  # ============================================
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${Project}-private-subnet-1'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Type
          Value: Private
        - Key: !Sub 'kubernetes.io/cluster/${Project}'
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: '1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${Project}-private-subnet-2'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project
        - Key: Type
          Value: Private
        - Key: !Sub 'kubernetes.io/cluster/${Project}'
          Value: shared
        - Key: kubernetes.io/role/internal-elb
          Value: '1'

  # ============================================
  # NAT Gateway (Optional)
  # ============================================
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    Condition: CreateNatGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Project}-nat-eip'
        - Key: Environment
          Value: !Ref Environment

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateNatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${Project}-nat-gateway'
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # Route Tables
  # ============================================
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${Project}-public-rt'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${Project}-private-rt'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  PrivateRoute:
    Type: AWS::EC2::Route
    Condition: CreateNatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ============================================
  # Security Groups
  # ============================================
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${Project}-bastion-sg'
      GroupDescription: Security group for Bastion host
      VpcId: !Ref VPC
      SecurityGroupEgress:
        # Allow all outbound traffic for package installations and internet access
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      # No ingress rules - all access via SSM Session Manager
      Tags:
        - Key: Name
          Value: !Sub '${Project}-bastion-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  EKSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${Project}-eks-platform-sg'
      GroupDescription: Security group for EKS cluster control plane
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # Bastion からの管理アクセス (kubectl)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref BastionSecurityGroup
          Description: Allow kubectl access from bastion
      SecurityGroupEgress:
        # Worker nodes への管理通信
        - IpProtocol: tcp
          FromPort: 10250
          ToPort: 10250
          CidrIp: !Ref VpcCidrBlock
          Description: Control plane to kubelet on worker nodes
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidrBlock
          Description: Control plane secure communication to workers
      Tags:
        - Key: Name
          Value: !Sub '${Project}-eks-platform-sg'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref Project

  # ============================================
  # Self-Reference Security Group Rules (Prevent circular dependency)
  # ============================================
  EKSClusterSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EKSClusterSecurityGroup
      IpProtocol: -1
      SourceSecurityGroupId: !Ref EKSClusterSecurityGroup
      Description: Allow cluster self-communication

  # ============================================
  # SSM Parameters for sharing values
  # ============================================
  VpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/eks/${Project}-${Version}/vpc-id'
      Type: String
      Value: !Ref VPC
      Description: VPC ID
      Tags:
        Environment: !Ref Environment
        Project: !Ref Project

  PublicSubnetIdsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/eks/${Project}-${Version}/public-subnet-ids'
      Type: StringList
      Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
      Description: Public subnet IDs
      Tags:
        Environment: !Ref Environment
        Project: !Ref Project

  PrivateSubnetIdsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/eks/${Project}-${Version}/private-subnet-ids'
      Type: StringList
      Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
      Description: Private subnet IDs
      Tags:
        Environment: !Ref Environment
        Project: !Ref Project

  BastionSecurityGroupIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/eks/${Project}-${Version}/bastion-sg-id'
      Type: String
      Value: !Ref BastionSecurityGroup
      Description: Bastion security group ID
      Tags:
        Environment: !Ref Environment
        Project: !Ref Project

  EKSClusterSecurityGroupIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/eks/${Project}-${Version}/eks-platform-sg-id'
      Type: String
      Value: !Ref EKSClusterSecurityGroup
      Description: EKS cluster security group ID
      Tags:
        Environment: !Ref Environment
        Project: !Ref Project

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  VpcCidr:
    Description: VPC CIDR Block
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub '${AWS::StackName}-VpcCidr'

  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet1Id'

  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnet2Id'

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Id'

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Id'

  BastionSecurityGroupId:
    Description: Bastion Security Group ID
    Value: !Ref BastionSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-BastionSecurityGroupId'

  EKSClusterSecurityGroupId:
    Description: EKS Cluster Security Group ID
    Value: !Ref EKSClusterSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-EKSClusterSecurityGroupId'

  NatGatewayStatus:
    Description: NAT Gateway creation status
    Value: !If [CreateNatGateway, 'Created', 'Not Created (Cost Optimization)']